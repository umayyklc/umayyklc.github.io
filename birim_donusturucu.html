<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Birim Dönüştürücü</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .back-btn { margin-bottom: 20px; color: #007bff; text-decoration: none; font-weight: bold; align-self: flex-start; margin-left: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 320px; border: 1px solid #e0e0e0; }
        h3 { margin: 0 0 20px 0; font-size: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .res-area { margin-top: 20px; background: #dff0d8; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; color: #3c763d; }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← Anasayfaya Dön</a>

<div class="card">
    <h3>Birim Dönüştürücü</h3>
    <label>Değer Giriniz:</label>
    <input type="number" id="val" placeholder="50">
    
    <label>Dönüşüm Tipi:</label>
    <select id="type">
        <option value="m-km">Metre -> Kilometre</option>
        <option value="c-f">Celsius -> Fahrenheit</option>
        <option value="kg-gr">Kilogram -> Gram</option>
    </select>

    <button onclick="convert()">Hesapla</button>
    <div class="res-area" id="out">Sonuç: -</div>
</div>

<script>
function convert() {
    const v = parseFloat(document.getElementById('val').value);
    const t = document.getElementById('type').value;
    let res = 0;

    if(isNaN(v)) return;

    if(t === 'm-km') res = v / 1000;
    else if(t === 'c-f') res = (v * 9/5) + 32;
    else if(t === 'kg-gr') res = v * 1000;

    document.getElementById('out').innerText = "Sonuç: " + res.toLocaleString('tr-TR');
}
</script>
</body>
</html>
